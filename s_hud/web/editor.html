<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="editor.css" />
</head>
<body>
    <div id="player-hud" class="ph-hidden">
        <div class="ph-row"><span class="ph-ico">HUN</span><div class="ph-bar"><div id="ph-hunger" class="ph-fill hunger"></div></div></div>
        <div class="ph-row"><span class="ph-ico">THI</span><div class="ph-bar"><div id="ph-thirst" class="ph-fill thirst"></div></div></div>
        <div class="ph-row"><span class="ph-ico">STA</span><div class="ph-bar"><div id="ph-stamina" class="ph-fill stamina"></div></div></div>
        <div id="ph-armour-row" class="ph-row hidden"><span class="ph-ico">ARM</span><div class="ph-bar"><div id="ph-armour" class="ph-fill armour"></div></div></div>
        <div id="ph-id" class="ph-id">saga-0000 &middot; ID 0</div>
    </div>
    <div id="overlay" class="hidden">
        <div id="grid"></div>
        <div id="toolbar">
            <span class="tb-title">HUD Layout</span>
            <span class="tb-hint">Drag each panel where you want it</span>
            <div class="tb-actions">
                <button id="btn-reset" class="btn ghost">Reset</button>
                <button id="btn-cancel" class="btn ghost">Cancel</button>
                <button id="btn-save" class="btn primary">Save</button>
            </div>
        </div>
        <div id="boxes"></div>
    </div>
    <script src="editor.js"></script>
    <script src="playerhud.js"></script>
</body>
</html>
